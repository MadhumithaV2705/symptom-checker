<!DOCTYPE html>
<html>
<head>
    <title>AI Symptom Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🩺 AI Symptom Checker</h1>

    <form method="POST">
        <div class="symptoms">
            <label><input type="checkbox" name="symptoms" value="fever"> Fever</label>
            <label><input type="checkbox" name="symptoms" value="cough"> Cough</label>
            <label><input type="checkbox" name="symptoms" value="headache"> Headache</label>
            <label><input type="checkbox" name="symptoms" value="sneezing"> Sneezing</label>
            <label><input type="checkbox" name="symptoms" value="runny nose"> Runny Nose</label>
            <label><input type="checkbox" name="symptoms" value="loss of smell"> Loss of Smell</label>
        </div>

        <button type="submit">Check Symptoms</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>Result: {{ result }}</h2>
        <p>{{ advice }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
